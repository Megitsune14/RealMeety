services:
  api:
    build:
      context: ./API
      target: production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/realmeety
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  app-web:
    build:
      context: ./app
      dockerfile: Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: always

volumes:
  mongo_data:
